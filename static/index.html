<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bundesarchiv Invenio Query Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-top: 3rem;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out;
            margin-bottom: 3rem;
        }

        .search-area {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .results {
            display: grid;
            gap: 1rem;
        }

        .card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 8px;
            transition: transform 0.3s, background 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .card-info h3 {
            margin: 0 0 0.5rem;
            font-size: 1.25rem;
        }

        .card-info p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .card-meta {
            text-align: right;
            font-size: 0.85rem;
            color: #818cf8;
        }

        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
        }

        .stat-sub {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Progress bar */
        .progress-wrap {
            margin-top: 0.6rem;
        }

        .progress-track {
            background: rgba(255,255,255,0.08);
            border-radius: 99px;
            height: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(to right, #6366f1, #c084fc);
            transition: width 0.8s ease;
            width: 0%;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.35rem;
        }

        .stats-loading {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            padding: 1rem 0;
        }

        /* Loading UI */
        .loader {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-bottom-color: var(--accent);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header>
        <h1>Bundesarchiv Archives</h1>
        <p class="subtitle">Query, view, and export archival entries from the Invenio API with zero friction.</p>
    </header>

    <div class="container">
        <!-- Dashboard -->
        <div id="dashboard">
            <p class="stats-loading">Loading archive statistics…</p>
        </div>

        <div class="search-area">
            <input type="text" id="searchInput" placeholder="Enter keywords or API endpoint..." />
            <button class="btn-primary" onclick="fetchData()">
                <span class="loader" id="loader"></span>
                <span id="btnText">Query</span>
            </button>
            <button class="btn-secondary" onclick="exportCSV()">Export CSV</button>
        </div>

        <div class="results" id="resultsArea">
            <!-- Items injected by JS -->
            <p style="text-align: center; color: var(--text-muted); padding: 2rem;">No entries fetched yet. Hit Query to view!</p>
        </div>
    </div>

    <script>
        let currentData = [];

        function fmt(n) {
            return n.toLocaleString('de-DE');
        }

        async function loadStats() {
            const dashboard = document.getElementById('dashboard');
            try {
                const res = await fetch('/api/stats');
                const s = await res.json();
                const pct = s.percent_digitized.toFixed(1);
                dashboard.innerHTML = `
                    <div class="dashboard">
                        <div class="stat-card">
                            <span class="stat-label">Total Records</span>
                            <span class="stat-value">${fmt(s.total)}</span>
                            <span class="stat-sub">in the archive</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Digitized</span>
                            <span class="stat-value">${fmt(s.digitized)}</span>
                            <span class="stat-sub">records with files</span>
                        </div>
                        <div class="stat-card" style="grid-column: span 2; min-width: 0;">
                            <span class="stat-label">Digitization Progress</span>
                            <span class="stat-value">${pct}%</span>
                            <div class="progress-wrap">
                                <div class="progress-track">
                                    <div class="progress-fill" id="progressFill"></div>
                                </div>
                                <div class="progress-label">
                                    <span>${fmt(s.digitized)} digitized</span>
                                    <span>${fmt(s.total - s.digitized)} not yet digitized</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
                // Animate the bar after a brief paint delay
                requestAnimationFrame(() => {
                    const fill = document.getElementById('progressFill');
                    if (fill) fill.style.width = pct + '%';
                });
            } catch (err) {
                dashboard.innerHTML = '<p class="stats-loading" style="color:#f87171;">Could not load statistics.</p>';
            }
        }

        async function fetchData() {
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            const resultsArea = document.getElementById('resultsArea');
            
            loader.style.display = 'block';
            btnText.style.display = 'none';
            resultsArea.innerHTML = '';
            
            try {
                // Read the search term
                const searchInput = document.getElementById('searchInput').value;
                const urlParams = new URLSearchParams();
                if (searchInput) urlParams.append('q', searchInput);
                
                // We're querying our Rust axum backend API
                const res = await fetch('/api/query?' + urlParams.toString());
                const data = await res.json();
                currentData = data;
                
                if (data.length === 0) {
                    resultsArea.innerHTML = '<p style="text-align: center; color: var(--text-muted);">No entries found.</p>';
                } else {
                    data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-info">
                                <h3>${item.title || 'Untitled Document'}</h3>
                                <p>ID: ${item.id}</p>
                            </div>
                            <div class="card-meta">
                                ${item.publication_date || 'N/A'}
                            </div>
                        `;
                        resultsArea.appendChild(card);
                    });
                }
            } catch (err) {
                console.error(err);
                resultsArea.innerHTML = '<p style="text-align: center; color: #ef4444;">Error fetching data. Ensure the Rust backend is serving the correct endpoint.</p>';
            } finally {
                loader.style.display = 'none';
                btnText.style.display = 'inline';
            }
        }

        function exportCSV() {
            const searchInput = document.getElementById('searchInput').value;
            const urlParams = new URLSearchParams();
            if (searchInput) urlParams.append('q', searchInput);
            window.location.href = '/api/export?' + urlParams.toString();
        }

        // Load dashboard stats immediately on page load
        loadStats();
    </script>
</body>
</html>
